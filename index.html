<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Читалка FB2 — мобильная</title>
<style>
body{margin:0;padding:0;font-family:Georgia,serif;background:#fdf6e3;}
#bookWrapper{max-width:900px;margin:6rem auto 2rem auto;padding:1rem;background:#fdf6e3;} 
#bookContainer{min-height:60vh;}
p.sentence{margin:1em 0;cursor:pointer;line-height:1.6;font-size:1rem;}
p.sentence.highlight{background:rgba(255,230,180,0.45);}
.tooltip{position:absolute;background:#fff8dc;border:1px solid #d4c29d;padding:6px 10px;border-radius:6px;display:none;}
#controls{
  position:fixed; top:0; left:0; width:100%;
  background:#fdf6e3; padding:0.5rem 1rem;
  box-shadow:0 2px 6px rgba(0,0,0,0.12);
  z-index:1000; display:flex; flex-wrap:wrap;
}
button,input,label,select{margin:0.3rem;}
</style>
</head>
<body>

<div id="controls">
  <input type="file" id="fileInput" accept=".json">
  <button id="loadLocalBtn">Загрузить</button>

  <select id="serverSelect">
    <option value="">— Vælg en bog —</option>
    <option value="1.json">Tre fra skoven — Yuri Nikitin</option>
    <option value="2.json">Tre i sandene — Yuri Nikitin</option>
    <option value="3.json">Tre og guderne — Yuri Nikitin</option>
    <option value="4.json">Tre i dalen — Yuri Nikitin</option>
  </select>

  <button id="savePosBtn">💾 Запомнить</button>
  <button id="loadPosBtn">📍 Перейти</button>

  <button id="readBtn">▶</button>
  <button id="pauseBtn">⏸</button>

  <label>Скорость: <span id="rateVal">0.75</span></label>
  <input type="range" id="rateSlider" min="0.1" max="1.5" step="0.05" value="0.75">
</div>

<div id="bookWrapper">
  <h2 id="titleText">— Выберите книгу —</h2>
  <div id="bookContainer"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const fileInput = document.getElementById('fileInput');
const loadLocalBtn = document.getElementById('loadLocalBtn');
const serverSelect = document.getElementById('serverSelect');
const savePosBtn = document.getElementById('savePosBtn');
const loadPosBtn = document.getElementById('loadPosBtn');
const bookContainer = document.getElementById('bookContainer');
const readBtn = document.getElementById('readBtn');
const pauseBtn = document.getElementById('pauseBtn');
const rateSlider = document.getElementById('rateSlider');
const rateVal = document.getElementById('rateVal');
const tooltip = document.getElementById('tooltip');
const titleText = document.getElementById('titleText');

let sentencesDA=[],translationsRU=[];
let ttsRate = parseFloat(rateSlider.value);
let readingIndex=0,reading=false,paused=false;

// скорость
rateSlider.oninput = ()=>{
  ttsRate=parseFloat(rateSlider.value);
  rateVal.textContent=ttsRate.toFixed(2);
};

// локальный файл
loadLocalBtn.onclick = ()=>{
  const f = fileInput.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>processText(reader.result,f.name);
  reader.readAsText(f);
};

// выбор книги
serverSelect.onchange = async ()=>{
  if(!serverSelect.value) return;
  const resp = await fetch(serverSelect.value);
  const text = await resp.text();
  processText(text,serverSelect.value);
};

// обработка текста
function processText(text, filename){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  sentencesDA=[]; translationsRU=[];
  for(const line of lines){
    try{
      const obj=JSON.parse(line);
      sentencesDA.push({id:obj.sentence_id,text:obj.dan});
      translationsRU.push({id:obj.sentence_id,text:obj.rus});
    }catch(e){}
  }
  titleText.textContent=filename;
  render();
}

// рендер
function render(){
  bookContainer.innerHTML="";
  sentencesDA.forEach(s=>{
    const p=document.createElement("p");
    p.className="sentence";
    p.textContent=s.text;
    p.dataset.id=s.id;
    bookContainer.appendChild(p);
  });
}

// сохранить позицию
savePosBtn.onclick = ()=>{
  const paragraphs = document.querySelectorAll("p.sentence");
  if(!paragraphs.length) return;

  let closestIndex=0, min=Infinity;
  paragraphs.forEach((p,i)=>{
    const d=Math.abs(p.getBoundingClientRect().top - window.innerHeight/3);
    if(d<min){min=d;closestIndex=i;}
  });

  const key = "pos_" + (serverSelect.value || titleText.textContent);
  localStorage.setItem(key, closestIndex);

  alert("Сохранено 👍");
};

// перейти
loadPosBtn.onclick = ()=>{
  const key = "pos_" + (serverSelect.value || titleText.textContent);
  const i = parseInt(localStorage.getItem(key));
  if(isNaN(i)) return alert("Нет позиции");

  const p = document.querySelectorAll("p.sentence")[i];
  if(!p) return;

  document.querySelectorAll(".highlight").forEach(e=>e.classList.remove("highlight"));
  p.classList.add("highlight");
  p.scrollIntoView({behavior:"smooth",block:"center"});
};

// клик читать
bookContainer.addEventListener('click', e=>{
  const p=e.target.closest('p.sentence');
  if(!p) return;
  readingIndex = Array.from(bookContainer.children).indexOf(p);
  reading=true; paused=false;
  speechSynthesis.cancel();
  highlightNext();
});

// пауза
pauseBtn.onclick = ()=>{
  if(!reading) return;
  paused=!paused;
  paused?speechSynthesis.pause():speechSynthesis.resume();
};

// чтение
function highlightNext(){
  if(!reading || paused) return;
  const ps = document.querySelectorAll("p.sentence");
  if(readingIndex>0) ps[readingIndex-1].classList.remove("highlight");
  if(readingIndex>=ps.length){reading=false;return;}

  const p=ps[readingIndex];
  p.classList.add("highlight");
  p.scrollIntoView({block:"center"});

  speakSentence(p.textContent, ()=>{
    readingIndex++;
    highlightNext();
  });
}

// TTS
function speakSentence(text, cb){
  const parts=text.split(/([,;:.!?])/).reduce((a,c)=>{
    if(/[.,;:!?]/.test(c)) a[a.length-1]+=c;
    else a.push(c.trim());
    return a;
  },[]).filter(s=>s);

  let i=0;
  const next=()=>{
    if(i>=parts.length){cb();return;}
    const u=new SpeechSynthesisUtterance(parts[i]);
    u.lang='da-DK';
    u.rate=ttsRate;
    u.onend=()=>{i++;next();};
    speechSynthesis.speak(u);
  };
  next();
}

readBtn.onclick = ()=>{
  readingIndex=0; reading=true; paused=false;
  speechSynthesis.cancel();
  highlightNext();
};
</script>

</body>
</html>
